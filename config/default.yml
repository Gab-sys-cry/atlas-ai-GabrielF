# config/default.yml -- Configuration applicative Atlas

model:
  name: "qwen3:8b" # ici on met le modèle Ollama installé localement
  temperature: 0.8
  top_p: 0.9
  num_ctx: 4096

persona:
  name: "Atlas"
  system_prompt: |
    Tu es Atlas, assistant IA interne d'ATLAS Consulting.
    Tu réponds en français de façon concise et précise.
    Tu refuses poliment toute requête hors du périmètre professionnel.

memory:
  # Mémoire courte (session)
  max_turns: 20
  persist: false
  persist_path: "data/history.json"

  # Mémoire longue (inter-sessions, vectorielle)
  long_term_enabled: true
  db_path: "data/memory"           # répertoire ChromaDB
  collection: "conversations"
  top_k: 5                         # souvenirs max injectés par tour
  min_similarity: 0.3              # seuil de pertinence (0–1)

guardrails:
  enabled: true
  max_input_length: 4000
  blocked_topics: ["trump", "guerre"]
  blocked_patterns: []

server:
  base_url: "http://localhost:11434"
  timeout: 120.0
  stream: true

ui:
  log_level: "WARNING"
  show_metrics: false