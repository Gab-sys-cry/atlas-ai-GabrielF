# config/default.yml -- Configuration applicative Atlas

model:
  name: "qwen3:8b" # à changer selon le modèle choisi, si config faite mannuellement
  temperature: 0.8
  top_p: 0.9
  num_ctx: 4096

persona:
  name: "Atlas"
  system_prompt: |
    Tu es Atlas, assistant IA interne d'ATLAS Consulting.
    Tu réponds en français de façon concise et précise.
    Tu refuses poliment toute requête hors du périmètre professionnel.

memory:
  max_turns: 20
  persist: false
  persist_path: "data/history.json"
  long_term_enabled: true
  db_path: "data/memory"
  collection: "conversations"
  top_k: 5
  min_similarity: 0.1

guardrails:
  enabled: true
  max_input_length: 4000
  blocked_topics: ["trump", "guerre"]
  blocked_patterns: []
  pii_detection: true
  prompt_injection: true
  rate_limit_enabled: true
  rate_limit_max: 20           # max requêtes par fenêtre
  rate_limit_window_s: 60      # fenêtre en secondes

tracing:
  enabled: true
  log_path: "data/traces.jsonl"

server:
  base_url: "http://localhost:11434"
  timeout: 120.0
  stream: true

ui:
  log_level: "WARNING"
  show_metrics: false